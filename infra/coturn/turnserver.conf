# REBUS ORBIT Visualiser TURN server
# ----------------------------------------------------------------------
# Deployed on VM 212 (10.0.200.212, Ubuntu 24.04, Docker).
# Public DNS: visualiser.rebus.industries -> 185.48.165.165
#             (NAT'd back to .212 by the UniFi gateway, see UNIFI_RULES.md)
#
# Co-deployed with PRISM server. PRISM mints credentials per stream via
# server/src/visualiser/turnCredentials.ts using RFC 7635 §3 long-term
# auth — the username is a `<exp>:<tag>` string and the password is
# base64(HMAC-SHA1(static-auth-secret, username)). For this to validate,
# the `static-auth-secret` below MUST exactly equal the `TURN_SECRET`
# env var in PRISM server's .env. The SETUP_NOTES walk through the
# sed-replace at deploy time.
# ----------------------------------------------------------------------

# --- Listeners --------------------------------------------------------
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0

# Public-facing IP the client sees, paired with the private IP the
# container actually binds on. coturn rewrites STUN XOR-MAPPED-ADDRESS
# attrs from the private to the public address so browsers behind NAT
# can route candidates correctly.
external-ip=185.48.165.165/10.0.200.212

# --- Authentication: RFC 7635 long-term credentials -------------------
# use-auth-secret enables the time-limited HMAC credential mechanism.
# PRISM mints credentials whose username = `<unix-epoch-exp>:<runid>`
# and credential = base64(HMAC-SHA1(static-auth-secret, username)).
# Rotation: edit the secret here AND in PRISM's .env, then
# `docker compose restart` on both.
use-auth-secret
static-auth-secret=<TURN_SECRET_PLACEHOLDER>
realm=visualiser.rebus.industries

# --- Relay port range -------------------------------------------------
# Narrowed from coturn's 49152-65535 default to 52000-56999 to avoid
# WireGuard's 51820/udp and shrink the UniFi port-forward attack
# surface. ~5000 UDP ports is still enough for several hundred
# concurrent WebRTC allocations. Must match the UniFi inbound rule in
# UNIFI_RULES.md.
min-port=52000
max-port=56999

# --- TLS for turns:// (TLS-over-TCP, port 5349) -----------------------
# Mandatory for clients behind networks that block plain UDP. Caddy on
# the proxy LXCs (10.0.200.251 / 10.0.200.252) ACMEs the cert for
# visualiser.rebus.industries via the standard HTTP-01 challenge on
# port 80; /usr/local/bin/sync-visualiser-cert.sh on VM 211 (rebus's
# @daily cron) mirrors the cert+key from Proxy1's Caddy data directory
# into ~rebus/coturn/certs/ on this host. docker-compose.yml then
# bind-mounts that directory read-only at /etc/coturn/certs/ inside
# the container.
#
# Renewal: Caddy auto-renews well before the 90-day Let's Encrypt
# expiry. The sync script compares fullchain.pem with the staged copy
# and only `docker compose restart`s coturn when the bytes change, so
# a normal day is a no-op.
cert=/etc/coturn/certs/fullchain.pem
pkey=/etc/coturn/certs/privkey.pem

# --- Logging ----------------------------------------------------------
# `no-stdout-log` would silence the container; we DO want stdout
# logging so `docker logs coturn` is useful. log-file=stdout sends the
# main log there instead of /var/log/turn_*.log inside the container.
log-file=stdout
verbose

# --- Hardening --------------------------------------------------------
no-cli
no-multicast-peers
no-tlsv1
no-tlsv1_1

# Forbid coturn from relaying TO any RFC-1918 / loopback / link-local /
# documentation / multicast range. Without these, a misconfigured
# credential lease could be used to pivot into the REBUS internal
# network through the TURN server. The two `allowed-peer-ip` lines
# below carve out a narrow exception for the workstation subnets
# coturn is allowed to relay back to (so the workstation's UE
# instance can register as a streamer).
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.0.2.0-192.0.2.255
denied-peer-ip=192.88.99.0-192.88.99.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=203.0.113.0-203.0.113.255
denied-peer-ip=240.0.0.0-255.255.255.255

# Explicit allows for the REBUS workstation VLANs. allowed-peer-ip
# punches a hole through the broader denied-peer-ip rules above.
allowed-peer-ip=10.0.10.200-10.0.10.250
allowed-peer-ip=10.0.200.200-10.0.200.250

# --- Resource limits --------------------------------------------------
# total-quota caps concurrent TURN allocations across the whole server.
# user-quota caps allocations per username (one stream worth, with a
# little headroom for ICE restarts). Tune upward only after measuring
# bandwidth — each 1080p60 H.264 stream is ~5-10 Mbps and the VM's WAN
# feed is finite.
total-quota=200
user-quota=50
