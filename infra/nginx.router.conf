resolver 127.0.0.11 valid=30s ipv6=off;

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;

    # Visualiser API routes -> prism-visualiser
    location ~ ^/api/visualiser(/?|$) {
        set $upstream_visualiser prism-visualiser:8768;
        proxy_pass http://$upstream_visualiser;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        client_max_body_size 2g;
    }

    # Admin WebSocket -> prism-visualiser
    location /ws/admin {
        set $upstream_visualiser prism-visualiser:8768;
        proxy_pass http://$upstream_visualiser;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Visualiser signalling + control WebSockets -> prism-visualiser
    location /ws/visualiser/ {
        set $upstream_visualiser prism-visualiser:8768;
        proxy_pass http://$upstream_visualiser;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Fixtures library routes -> prism-fixtures
    location ~ ^/api/(fixtures|gdtf-share|mvr-import)(/?|$) {
        set $upstream_fixtures prism-fixtures:8769;
        proxy_pass http://$upstream_fixtures;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        client_max_body_size 2g;
    }

    # Model library routes -> prism-models
    location ~ ^/api/(models|model-import)(/?|$) {
        set $upstream_models prism-models:8770;
        proxy_pass http://$upstream_models;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        client_max_body_size 2g;
    }

    # Portal access + permissions policy -> prism-permissions
    location ~ ^/api/(access|permissions)(/?|$) {
        set $upstream_permissions prism-permissions:8771;
        proxy_pass http://$upstream_permissions;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Materials store + external browse/import -> prism-materials
    location ~ ^/api/(materials|textures|material-groups|external-materials|fab)(/|$) {
        set $upstream_materials prism-materials:8766;
        proxy_pass http://$upstream_materials;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        client_max_body_size 2g;
    }

    # Agent WebSocket -> prism-agent
    location /ws/agent {
        set $upstream_agent prism-agent:8767;
        proxy_pass http://$upstream_agent;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # APPEND to the forwarded chain instead of overwriting it. The outer
        # Caddy proxy already authoritatively sets X-Forwarded-For to the
        # agent's real LAN IP (e.g. 10.0.10.202); here $remote_addr is only
        # Caddy's own address (10.0.200.251). Using "$remote_addr" would clobber
        # that real IP, so prism-agent (Fastify trustProxy=true) would record
        # Caddy's IP in agent_sessions.remote_addr — which the admin
        # "Open Web UI" link then points at (wrong host). $proxy_add_x_forwarded_for
        # keeps the agent's real IP at the head of the chain so req.ip resolves
        # to it and the link targets the actual workstation.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Agent installer meta + download -> prism-server (version resolution +
    # multi-repo GitHub lookup lives in server/src/api/workstationDownloads.ts).
    # Must appear BEFORE the broader workstation block below — nginx picks the
    # first matching regex and `/api/admin/workstations/downloads/*` would
    # otherwise be proxied to prism-agent (stale polyrepo copy).
    location ~ ^/api/admin/workstations/downloads(/|$) {
        set $upstream_server prism-server:8765;
        proxy_pass http://$upstream_server;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        client_max_body_size 2g;
    }

    # Workstation admin API (list, roles, restart, pull-template) -> prism-agent
    location ~ ^/api/(workstations|admin/workstations)(/|$) {
        set $upstream_agent prism-agent:8767;
        proxy_pass http://$upstream_agent;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        client_max_body_size 2g;
    }

    # API documentation (Redoc + portal guide) -> prism-server
    location /docs {
        set $upstream_server prism-server:8765;
        proxy_pass http://$upstream_server;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other API routes + health + public v1 API -> prism-server
    location ~ ^/(api|health|v1)(/?|$) {
        set $upstream_server prism-server:8765;
        proxy_pass http://$upstream_server;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        client_max_body_size 2g;
    }

    # Privileged agent file transfer -> prism-server
    # The job dispatcher (in prism-agent) hands each agent a signed
    # /internal/files/:jobId?token=... URL to download the source upload, and the
    # agent POSTs non-ORBIT outputs back to /internal/outputs/:jobId/:format.
    # Only prism-server registers the /internal plugin; without this block these
    # requests fall through to `location /` (prism-web SPA) and 404, breaking
    # every convert / pollLayers download.
    location ~ ^/internal(/?|$) {
        set $upstream_server prism-server:8765;
        proxy_pass http://$upstream_server;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        client_max_body_size 2g;
    }

    # Remaining WebSocket paths -> prism-server (agent, admin, visualiser handled above)
    location /ws/ {
        set $upstream_server prism-server:8765;
        proxy_pass http://$upstream_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Everything else (SPA, assets, public files) -> prism-web
    location / {
        set $upstream_web prism-web:80;
        proxy_pass http://$upstream_web;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Slack merge bot (CT 271) — /slack/merge -> :3456/merge etc.
    location /slack/ {
        rewrite ^/slack/(.*)$ /$1 break;
        proxy_pass http://10.0.200.71:3456;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }
}