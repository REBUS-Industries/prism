resolver 127.0.0.11 valid=30s ipv6=off;

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;

    # Materials + textures routes -> prism-materials
    location ~ ^/api/(materials|textures)(/?|$) {
        set $upstream_materials prism-materials:8766;
        proxy_pass http://$upstream_materials;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        client_max_body_size 1g;
    }

    # All other API routes + health -> prism-server
    location ~ ^/(api|health)(/?|$) {
        set $upstream_server prism-server:8765;
        proxy_pass http://$upstream_server;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        client_max_body_size 1g;
    }

    # WebSocket (agent + admin) -> prism-server
    location /ws/ {
        set $upstream_server prism-server:8765;
        proxy_pass http://$upstream_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Everything else (SPA, assets, public files) -> prism-web
    location / {
        set $upstream_web prism-web:80;
        proxy_pass http://$upstream_web;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}