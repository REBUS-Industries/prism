map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream prism_server {
    server prism-server:8765;
    keepalive 32;
}

upstream prism_web {
    server prism-web:80;
    keepalive 16;
}

server {
    listen 80;

    # API routes -> prism-server
    location ~ ^/(api|health)(/|$) {
        proxy_pass http://prism_server;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        client_max_body_size 1g;
    }

    # WebSocket (agent + admin) -> prism-server
    location /ws/ {
        proxy_pass http://prism_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Everything else (SPA, assets, public files) -> prism-web
    location / {
        proxy_pass http://prism_web;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
