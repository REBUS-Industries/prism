# PRISM split stack â€” VM 212 production (`https://prism.rebus.industries`).
# Authoritative compose for `/opt/prism` on VM 212.
# VM 211 runs ORBIT only â€” do not deploy this file there.

services:
  prism-server:
    image: ghcr.io/rebus-industries/prism-server:${PRISM_IMAGE_TAG:-latest}
    container_name: prism-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      # Ensure the preconvert sidecar is on the compose network before
      # prism-server accepts GLB uploads (avoids opaque undici "fetch failed").
      prism-assimp:
        condition: service_started
    # No host port â€” prism-router handles external traffic on :8765
    environment:
      NODE_ENV: production
      PORT: 8765
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-https://prism.rebus.industries}"
      POSTGRES_URL: "postgres://${POSTGRES_USER:-prism}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-prism}"
      REDIS_URL: "redis://redis:6379"
      ORBIT_SERVER_URL: "${ORBIT_SERVER_URL}"
      ORBIT_DEV_SERVER_URL: "${ORBIT_DEV_SERVER_URL:-}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      SESSION_SECRET: "${SESSION_SECRET}"
      UPLOAD_DIR: "/var/lib/prism/uploads"
      DATA_DIR: "/data/prism"
      ASSIMP_SERVICE_URL: "${ASSIMP_SERVICE_URL:-http://prism-assimp:8088}"
      TURN_SECRET: "${TURN_SECRET:-}"
      TURN_REALM: "${TURN_REALM:-visualiser.rebus.industries}"
      JWT_SIGNALLING_SECRET: "${JWT_SIGNALLING_SECRET:-}"
      PERMISSIONS_SERVICE_URL: "http://prism-permissions:8771"
      PERMISSIONS_INTERNAL_KEY: "${PERMISSIONS_INTERNAL_KEY:-}"
      JWT_SIGNALLING_TTL_SEC: "${JWT_SIGNALLING_TTL_SEC:-3600}"
      VISUALISER_START_TIMEOUT_MS: "${VISUALISER_START_TIMEOUT_MS:-600000}"
      VISUALISER_IDLE_TIMEOUT_MS: "${VISUALISER_IDLE_TIMEOUT_MS:-600000}"
      PRISM_GITHUB_TOKEN: "${PRISM_GITHUB_TOKEN:-}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      # WEB_DIST_DIR intentionally omitted: webStatic.ts skips gracefully
      # when the dir is absent, deferring all SPA serving to prism-web.
    volumes:
      - prism-uploads:/var/lib/prism/uploads
      - prism-data:/data/prism
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8765/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  prism-web:
    image: ghcr.io/rebus-industries/prism-web:${PRISM_WEB_TAG:-latest}
    container_name: prism-web
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prism-router:
    image: nginx:alpine
    container_name: prism-router
    restart: unless-stopped
    depends_on:
      - prism-server
      - prism-web
      - prism-agent
      - prism-visualiser
      - prism-materials
      - prism-fixtures
      - prism-models
      - prism-permissions
    ports:
      - "8765:80"
    volumes:
      - ./nginx.router.conf:/etc/nginx/conf.d/default.conf:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prism-materials:
    # Monorepo materials-service entry â€” includes Fab/external-materials + DB token reload.
    # prism-materials-service polyrepo lags (no fab routes); revert when polyrepo syncs.
    image: ghcr.io/rebus-industries/prism-server:${PRISM_IMAGE_TAG:-latest}
    command: ["node", "dist/server/src/materials-service.js"]
    container_name: prism-materials
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      flaresolverr:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8766
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-https://prism.rebus.industries}"
      POSTGRES_URL: "postgres://${POSTGRES_USER:-prism}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-prism}"
      ORBIT_SERVER_URL: "${ORBIT_SERVER_URL:-https://orbit.rebus.industries}"
      ORBIT_DEV_SERVER_URL: "${ORBIT_DEV_SERVER_URL:-https://orbit-dev.rebus.industries}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      SESSION_SECRET: "${SESSION_SECRET}"
      DATA_DIR: "/data/prism"
      REDIS_URL: "redis://redis:6379"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      FAB_EPIC_REFRESH_TOKEN: "${FAB_EPIC_REFRESH_TOKEN:-}"
      FAB_EPIC_CLIENT_ID: "${FAB_EPIC_CLIENT_ID:-}"
      FAB_EPIC_CLIENT_SECRET: "${FAB_EPIC_CLIENT_SECRET:-}"
      FAB_ENABLED: "${FAB_ENABLED:-true}"
      # Default: in-compose FlareSolverr service. Override in .env when FlareSolverr runs on the VM host.
      FAB_FLARESOLVERR_URL: "${FAB_FLARESOLVERR_URL:-http://flaresolverr:8191/v1}"
      FAB_HTTP_PROXY: "${FAB_HTTP_PROXY:-}"
      POLYHAVEN_ENABLED: "${POLYHAVEN_ENABLED:-true}"
      POLYHAVEN_USER_AGENT: "${POLYHAVEN_USER_AGENT:-PRISM/0.3.0 (REBUS Industries; materials-import)}"
      POLYHAVEN_TEXTURE_RESOLUTION: "${POLYHAVEN_TEXTURE_RESOLUTION:-2k}"
      AMBIENTCG_ENABLED: "${AMBIENTCG_ENABLED:-true}"
      AMBIENTCG_DOWNLOAD_ATTRIBUTES: "${AMBIENTCG_DOWNLOAD_ATTRIBUTES:-2K-JPG}"
    volumes:
      - prism-data:/data/prism
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8766/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prism-fixtures:
    image: ghcr.io/rebus-industries/prism-fixtures-service:${PRISM_FIXTURES_TAG:-latest}
    container_name: prism-fixtures
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8769
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-https://prism.rebus.industries}"
      POSTGRES_URL: "postgres://${POSTGRES_USER:-prism}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-prism}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      SESSION_SECRET: "${SESSION_SECRET}"
      DATA_DIR: "/data/prism"
      REDIS_URL: "redis://redis:6379"
      ASSIMP_SERVICE_URL: "${ASSIMP_SERVICE_URL:-http://prism-assimp:8088}"
      ORBIT_SERVER_URL: "${ORBIT_SERVER_URL:-https://orbit.rebus.industries}"
      ORBIT_DEV_SERVER_URL: "${ORBIT_DEV_SERVER_URL:-https://orbit-dev.rebus.industries}"
      ORBIT_FIXTURES_PROJECT_ID: "${ORBIT_FIXTURES_PROJECT_ID:-0f2893eb28}"
      ORBIT_FIXTURES_TARGET: "${ORBIT_FIXTURES_TARGET:-prod}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      - prism-data:/data/prism
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8769/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prism-models:
    image: ghcr.io/rebus-industries/prism-models-service:${PRISM_MODELS_TAG:-latest}
    container_name: prism-models
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8770
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-https://prism.rebus.industries}"
      # Shared prism DB â€” used only for auth (admin sessions / API keys / settings).
      POSTGRES_URL: "postgres://${POSTGRES_USER:-prism}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-prism}"
      # Dedicated model store DB (created automatically at boot if missing).
      MODELS_POSTGRES_URL: "postgres://${POSTGRES_USER:-prism}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_MODELS_DB:-prism_models}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      SESSION_SECRET: "${SESSION_SECRET}"
      DATA_DIR: "/data/prism"
      REDIS_URL: "redis://redis:6379"
      ASSIMP_SERVICE_URL: "${ASSIMP_SERVICE_URL:-http://prism-assimp:8088}"
      ORBIT_SERVER_URL: "${ORBIT_SERVER_URL:-https://orbit.rebus.industries}"
      ORBIT_DEV_SERVER_URL: "${ORBIT_DEV_SERVER_URL:-https://orbit-dev.rebus.industries}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      # Model import â†’ PRISM convert pipeline + Orbit Model Library project.
      ORBIT_MODEL_LIBRARY_PROJECT_ID: "${ORBIT_MODEL_LIBRARY_PROJECT_ID:-e86589cc1e}"
      ORBIT_MODEL_LIBRARY_TARGET: "${ORBIT_MODEL_LIBRARY_TARGET:-prod}"
      PRISM_SERVER_URL: "http://prism-server:8765"
      PRISM_SERVICE_API_KEY: "${PRISM_SERVICE_API_KEY:-}"
      CONVERT_UPLOAD_DIR: "/var/lib/prism/uploads"
    volumes:
      - prism-data:/data/prism
      - prism-uploads:/var/lib/prism/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8770/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prism-permissions:
    image: ghcr.io/rebus-industries/prism-permissions-service:${PRISM_PERMISSIONS_TAG:-latest}
    container_name: prism-permissions
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8771
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-https://prism.rebus.industries}"
      POSTGRES_URL: "postgres://${POSTGRES_USER:-prism}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-prism}"
      SESSION_SECRET: "${SESSION_SECRET}"
      PORTAL_ADAPTER: "${PORTAL_ADAPTER:-mock}"
      PORTAL_BASE_URL: "${PORTAL_BASE_URL:-https://portal.rebus.industries}"
      PORTAL_API_KEY: "${PORTAL_API_KEY:-}"
      ORBIT_SERVER_URL: "${ORBIT_SERVER_URL:-https://orbit.rebus.industries}"
      ORBIT_DEV_SERVER_URL: "${ORBIT_DEV_SERVER_URL:-https://orbit-dev.rebus.industries}"
      ORBIT_ADMIN_TOKEN: "${ORBIT_ADMIN_TOKEN:-}"
      ORBIT_DEV_ADMIN_TOKEN: "${ORBIT_DEV_ADMIN_TOKEN:-${ORBIT_ADMIN_TOKEN:-}}"
      # Dedicated PAT with tokens:write for apiTokenCreate (invite-key sessions).
      # Falls back to ORBIT_ADMIN_TOKEN inside the service when unset.
      ORBIT_MINT_TOKEN: "${ORBIT_MINT_TOKEN:-}"
      ORBIT_DEV_MINT_TOKEN: "${ORBIT_DEV_MINT_TOKEN:-${ORBIT_MINT_TOKEN:-}}"
      ORBIT_AUTO_INVITE: "${ORBIT_AUTO_INVITE:-0}"
      PERMISSIONS_INTERNAL_KEY: "${PERMISSIONS_INTERNAL_KEY:-}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8771/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prism-visualiser:
    image: ghcr.io/rebus-industries/prism-visualiser-service:${PRISM_VISUALISER_TAG:-latest}
    container_name: prism-visualiser
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 8768
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-https://prism.rebus.industries}"
      POSTGRES_URL: "postgres://${POSTGRES_USER:-prism}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-prism}"
      REDIS_URL: "redis://redis:6379"
      ORBIT_SERVER_URL: "${ORBIT_SERVER_URL}"
      ORBIT_DEV_SERVER_URL: "${ORBIT_DEV_SERVER_URL:-}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      SESSION_SECRET: "${SESSION_SECRET}"
      TURN_SECRET: "${TURN_SECRET:-}"
      TURN_REALM: "${TURN_REALM:-visualiser.rebus.industries}"
      JWT_SIGNALLING_SECRET: "${JWT_SIGNALLING_SECRET:-}"
      JWT_SIGNALLING_TTL_SEC: "${JWT_SIGNALLING_TTL_SEC:-3600}"
      VISUALISER_START_TIMEOUT_MS: "${VISUALISER_START_TIMEOUT_MS:-600000}"
      VISUALISER_IDLE_TIMEOUT_MS: "${VISUALISER_IDLE_TIMEOUT_MS:-600000}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8768/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prism-agent:
    image: ghcr.io/rebus-industries/prism-agent-service:${PRISM_AGENT_TAG:-latest}
    container_name: prism-agent
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 8767
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-https://prism.rebus.industries}"
      POSTGRES_URL: "postgres://${POSTGRES_USER:-prism}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-prism}"
      REDIS_URL: "redis://redis:6379"
      ORBIT_SERVER_URL: "${ORBIT_SERVER_URL}"
      ORBIT_DEV_SERVER_URL: "${ORBIT_DEV_SERVER_URL:-}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      SESSION_SECRET: "${SESSION_SECRET}"
      UPLOAD_DIR: "/var/lib/prism/uploads"
      ASSIMP_SERVICE_URL: "${ASSIMP_SERVICE_URL:-http://prism-assimp:8088}"
      PRISM_GITHUB_TOKEN: "${PRISM_GITHUB_TOKEN:-}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      - prism-uploads:/var/lib/prism/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8767/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16.9-alpine
    container_name: prism-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-prism}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-prism}"
    volumes:
      - prism-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prism} -d ${POSTGRES_DB:-prism}"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: valkey/valkey:8-alpine
    container_name: prism-redis
    restart: unless-stopped
    command: ["valkey-server", "--save", "60", "1000", "--appendonly", "yes"]
    volumes:
      - prism-redis-data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


  prism-assimp:
    # Dev tracks latest like prism-web/prism-fixtures. Hardcoded (not
    # ${PRISM_ASSIMP_TAG}) because a stale PRISM_ASSIMP_TAG=v0.3.9 pin in the
    # VM .env kept dev on an old image missing /v1/convert-glb (3DSâ†’GLB),
    # silently falling back to primitive boxes. Prod pins via docker-compose.yml.
    image: ghcr.io/rebus-industries/prism-assimp:latest
    container_name: prism-assimp
    restart: unless-stopped
    environment:
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      ASSIMP_WORK_ROOT: /work
      PYTHONUNBUFFERED: "1"
    volumes:
      - prism-assimp-work:/work
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8088/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  flaresolverr:
    # Cloudflare solver for Fab browse â€” same Docker network as prism-materials.
    # prism-materials defaults FAB_FLARESOLVERR_URL to http://flaresolverr:8191/v1.
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    # Cap RAM so leaked Chromium sessions OOM-recycle instead of starving the VM.
    # Host cron also restarts this container (see infra/scripts/prism-dev-host-cleanup.sh).
    mem_limit: 6g
    memswap_limit: 6g
    environment:
      LOG_LEVEL: info
      CAPTCHA_SOLVER: none
      BROWSER_TIMEOUT: "120000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8191/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  prism-postgres-data:
  prism-redis-data:
  prism-uploads:
  prism-assimp-work:
  prism-data:
