<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#E8601C" />
    <title>PRISM convert</title>
    <!-- See admin/index.html for the rationale; both SPAs share the same key. -->
    <script>
      (function () {
        try {
          var v = localStorage.getItem('prism.theme');
          if (v !== 'light' && v !== 'dark' && v !== 'system') v = 'system';
          var resolved = v === 'system'
            ? (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : v;
          document.documentElement.dataset.theme = resolved;
          document.documentElement.classList.toggle('dark', resolved === 'dark');
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
