server {
    listen 80;
    root /usr/share/nginx/html;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~ ^/(prism-logo|favicon)\.png$ {
        expires 1h;
    }

    location /admin/ {
        alias /usr/share/nginx/html/src/admin/;
        index index.html;
        try_files $uri /src/admin/index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location /convert/ {
        alias /usr/share/nginx/html/src/convert/;
        index index.html;
        try_files $uri /src/convert/index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location /viewer/ {
        alias /usr/share/nginx/html/src/viewer/;
        index index.html;
        try_files $uri /src/viewer/index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location = / { return 302 /admin/; }
    location = /admin { return 302 /admin/; }
    location = /convert { return 302 /convert/; }
    location = /viewer { return 302 /viewer/; }
}
