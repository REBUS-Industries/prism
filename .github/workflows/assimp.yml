name: assimp-image

# Builds + pushes the prism-assimp pre-conversion sidecar to GHCR.
#
# Image:      ghcr.io/rebus-industries/prism-assimp
# Tags:       latest (on main), <branch>, <short-sha>, <tag-name> (on tag push)
# Caching:    GHA-native layer cache.  The libassimp build stage is the
#             expensive part (~5-7 min cold) so the cache pays for itself
#             after the first run.
#
# Permissions: `packages: write` to push to GHCR; `contents: read` for checkout.

on:
  push:
    branches: [main]
    # Match every PRISM monorepo `v*` release tag, but exclude the
    # Visualiser tag family (`visualiser-v*`) which has its own
    # workflow.  Without the `!visualiser-*` guard the bare `v*` glob
    # also matches `visualiser-v0.1.0` and friends, causing stray
    # `prism-assimp:visualiser-v...` images to land on GHCR.  GitHub
    # Actions requires the exclusion to come AFTER the inclusion in
    # the same list.
    tags:
      - 'v*'
      - '!visualiser-*'
    paths:
      - 'assimp/**'
      - '.github/workflows/assimp.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/rebus-industries/prism-assimp
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: assimp
          file: assimp/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: ${{ github.event_name == 'workflow_dispatch' }}
          cache-from: ${{ github.event_name == 'workflow_dispatch' && '' || 'type=gha' }}
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, prism-deploy]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Sync split compose + restart prism-assimp on VM 212 (prod)
        run: |
          scp -o BatchMode=yes -o ConnectTimeout=10 \
            infra/docker-compose.dev.yml \
            prism-prod:/opt/prism/docker-compose.dev.yml
          scp -o BatchMode=yes -o ConnectTimeout=10 \
            infra/nginx.router.conf \
            prism-prod:/opt/prism/nginx.router.conf
          ssh -o BatchMode=yes -o ConnectTimeout=10 prism-prod <<'REMOTE'
            set -euo pipefail
            cd /opt/prism
            cp docker-compose.dev.yml docker-compose.yml
            docker compose pull prism-assimp
            docker compose up -d prism-assimp
            docker compose ps prism-assimp
          REMOTE
