name: web-image

# Builds the PRISM admin/convert/viewer SPA as a standalone nginx container
# (prism-web) on VM 212 (prism.rebus.industries). Deploys on push to main.
# Server API changes deploy via server-image (separate workflow).

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'infra/docker-compose.dev.yml'
      - 'infra/nginx.router.conf'
      - '.github/workflows/web.yml'
  # Satisfy branch-protection `web-image / build-and-push` on PRs without
  # building/pushing the Docker image (that still runs on push to main).
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        if: github.event_name == 'pull_request'
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package.json

      - name: Build web (PR validation)
        if: github.event_name == 'pull_request'
        working-directory: web
        run: |
          npm install --no-audit --no-fund
          npm run build

      - uses: docker/setup-buildx-action@v3
        if: github.event_name != 'pull_request'

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        if: github.event_name != 'pull_request'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/rebus-industries/prism-web
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        if: github.event_name != 'pull_request'
        with:
          context: web
          file: web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: ${{ github.event_name == 'workflow_dispatch' }}
          cache-from: ${{ github.event_name == 'workflow_dispatch' && '' || 'type=gha' }}
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, prism-deploy]
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
    concurrency:
      group: prism-deploy-vm212
      cancel-in-progress: false
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Sync split compose + deploy prism-web to VM 212 (prod)
        run: |
          scp -o BatchMode=yes -o ConnectTimeout=10 \
            infra/docker-compose.dev.yml \
            prism-prod:/opt/prism/docker-compose.dev.yml
          scp -o BatchMode=yes -o ConnectTimeout=10 \
            infra/nginx.router.conf \
            prism-prod:/opt/prism/nginx.router.conf
          ssh -o BatchMode=yes -o ConnectTimeout=10 prism-prod <<'REMOTE'
            set -euo pipefail
            cd /opt/prism
            cp docker-compose.dev.yml docker-compose.yml
            # VM .env may pin PRISM_WEB_TAG to an old sha — always roll forward on deploy.
            export PRISM_WEB_TAG=latest
            docker compose pull prism-web prism-fixtures prism-models prism-permissions
            docker compose up -d --force-recreate --pull always \
              prism-web prism-fixtures prism-models prism-permissions prism-router
            docker exec prism-router nginx -s reload
            docker compose ps prism-web prism-fixtures prism-models prism-permissions prism-router
            docker image prune -af --filter "until=24h" 2>/dev/null || true
          REMOTE

      - name: Clean runner workspace
        if: always()
        run: find "$GITHUB_WORKSPACE/.." -mindepth 1 -maxdepth 1 ! -samefile "$GITHUB_WORKSPACE" -exec rm -rf {} + 2>/dev/null || true
