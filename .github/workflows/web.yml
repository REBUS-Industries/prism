name: web-image

# Builds the PRISM admin/convert/viewer SPA as a standalone nginx container
# (prism-web) on VM 212 (prism.rebus.industries). Deploys on push to main.
# Server API changes deploy via server-image (separate workflow).

on:
  push:
    branches: [main, feat/permissions]
    paths:
      - 'web/**'
      - 'infra/docker-compose.dev.yml'
      - 'infra/nginx.router.conf'
      - '.github/workflows/web.yml'
  # Satisfy branch-protection `web-image / build-and-push` on PRs without
  # building/pushing the Docker image (that still runs on push to main).
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        if: github.event_name == 'pull_request'
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package.json

      - name: Build web (PR validation)
        if: github.event_name == 'pull_request'
        working-directory: web
        run: |
          npm install --no-audit --no-fund
          npm run build

      - uses: docker/setup-buildx-action@v3
        if: github.event_name != 'pull_request'

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        if: github.event_name != 'pull_request'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/rebus-industries/prism-web
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        if: github.event_name != 'pull_request'
        with:
          context: web
          file: web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: ${{ github.event_name == 'workflow_dispatch' }}
          cache-from: ${{ github.event_name == 'workflow_dispatch' && '' || 'type=gha' }}
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, prism-deploy]
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feat/permissions' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
    concurrency:
      group: prism-deploy-vm212
      cancel-in-progress: false
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Sync split compose + deploy prism-web to VM 212 (prod)
        env:
          # prism-dev SSH alias on deploy runners -> VM 212 (Caddy upstream).
          # Do not use prism-prod — it pointed at a shadow stack, not live traffic.
          DEPLOY_HOST: prism-dev
        run: |
          WEB_TAG="sha-${GITHUB_SHA:0:7}"
          ssh -o BatchMode=yes -o ConnectTimeout=10 "${DEPLOY_HOST}" hostname
          scp -o BatchMode=yes -o ConnectTimeout=10 \
            infra/docker-compose.dev.yml \
            "${DEPLOY_HOST}:/opt/prism/docker-compose.dev.yml"
          scp -o BatchMode=yes -o ConnectTimeout=10 \
            infra/nginx.router.conf \
            "${DEPLOY_HOST}:/opt/prism/nginx.router.conf"
          ssh -o BatchMode=yes -o ConnectTimeout=10 "${DEPLOY_HOST}" env \
            "WEB_TAG=${WEB_TAG}" "GIT_SHA=${GITHUB_SHA}" bash -s <<'REMOTE'
            set -euo pipefail
            cd /opt/prism
            cp docker-compose.dev.yml docker-compose.yml
            # VM .env may pin PRISM_WEB_TAG to an old sha — persist the tag we just built.
            if [ -f .env ] && grep -q '^PRISM_WEB_TAG=' .env; then
              sed -i "s/^PRISM_WEB_TAG=.*/PRISM_WEB_TAG=${WEB_TAG}/" .env
            else
              echo "PRISM_WEB_TAG=${WEB_TAG}" >> .env
            fi
            export PRISM_WEB_TAG="${WEB_TAG}"
            echo "Deploying prism-web:${WEB_TAG} (commit ${GIT_SHA})"
            docker compose pull prism-web
            docker compose up -d --force-recreate --no-deps --pull always prism-web
            docker compose up -d --force-recreate --no-deps prism-router
            docker compose ps prism-web prism-router
            REV="$(docker inspect prism-web --format '{{index .Config.Labels "org.opencontainers.image.revision"}}')"
            echo "prism-web image revision: ${REV}"
            if [ "${REV}" != "${GIT_SHA}" ]; then
              echo "::error::prism-web revision ${REV} != expected ${GIT_SHA}"
              exit 1
            fi
            BUNDLE=""
            ROUTER_BUNDLE=""
            for attempt in 1 2 3 4 5; do
              sleep 2
              BUNDLE="$(docker exec prism-web wget -qO- http://127.0.0.1/admin/ 2>/dev/null | grep -oE 'admin-[A-Za-z0-9_-]+\.js' | head -1 || true)"
              ROUTER_BUNDLE="$(wget -qO- http://127.0.0.1:8765/admin/ 2>/dev/null | grep -oE 'admin-[A-Za-z0-9_-]+\.js' | head -1 || true)"
              if [ -n "${BUNDLE}" ]; then break; fi
              echo "waiting for prism-web admin HTML (attempt ${attempt}/5)..."
            done
            echo "prism-web admin bundle: ${BUNDLE:-<empty>}"
            echo "prism-router admin bundle: ${ROUTER_BUNDLE:-<empty>}"
            if [ -z "${BUNDLE}" ]; then
              echo "::error::Could not read admin bundle from prism-web container"
              exit 1
            fi
            if [ -n "${ROUTER_BUNDLE}" ] && [ "${ROUTER_BUNDLE}" != "${BUNDLE}" ]; then
              echo "::warning::prism-router serves ${ROUTER_BUNDLE} but prism-web has ${BUNDLE}"
            fi
            PUBLIC_HTML="$(curl -fsS --max-time 15 https://prism.rebus.industries/admin/ || true)"
            PUBLIC_BUNDLE="$(printf '%s' "${PUBLIC_HTML}" | grep -oE 'admin-[A-Za-z0-9_-]+\.js' | head -1 || true)"
            echo "public admin bundle: ${PUBLIC_BUNDLE:-<empty>}"
            if [ -n "${PUBLIC_BUNDLE}" ] && [ "${PUBLIC_BUNDLE}" != "${BUNDLE}" ]; then
              echo "::error::Public https://prism.rebus.industries/admin/ serves ${PUBLIC_BUNDLE} but prism-web has ${BUNDLE}"
              exit 1
            fi
          REMOTE

      - name: Clean runner workspace
        if: always()
        run: find "$GITHUB_WORKSPACE/.." -mindepth 1 -maxdepth 1 ! -samefile "$GITHUB_WORKSPACE" -exec rm -rf {} + 2>/dev/null || true
