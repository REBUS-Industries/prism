name: deploy-dev-service

# Triggered by repository_dispatch from the polyrepo service workflows
# (prism-materials-service, prism-agent-service, prism-visualiser-service,
# prism-server-polyrepo).  Pulls and restarts a single named service on
# VM 212 (prism-dev.rebus.industries).
#
# Payload:  {"event_type":"deploy-dev-service","client_payload":{"service":"<name>"}}
# Services: prism-materials | prism-fixtures | prism-agent | prism-visualiser | prism-server
#
# The self-hosted runner (LXC 261) has SSH access to prism-dev via the
# runner-local prism_deploy_ed25519 key and the ~/.ssh/config alias.

on:
  repository_dispatch:
    types: [deploy-dev-service]
  workflow_dispatch:
    inputs:
      service:
        description: 'Compose service name (prism-materials | prism-fixtures | prism-agent | prism-visualiser | prism-server)'
        required: true

jobs:
  deploy-dev:
    runs-on: [self-hosted, prism-deploy]
    steps:
      - name: Pull and restart service on VM 212
        run: |
          SERVICE="${{ github.event.client_payload.service || github.event.inputs.service }}"
          if [ -z "$SERVICE" ]; then
            echo "::error::client_payload.service is empty — cannot deploy"
            exit 1
          fi
          echo "Deploying ${SERVICE} to prism-dev (VM 212)..."
          ssh -o BatchMode=yes -o ConnectTimeout=10 prism-dev "
            set -euo pipefail
            cd /opt/prism
            docker compose -f docker-compose.dev.yml pull ${SERVICE}
            docker compose -f docker-compose.dev.yml up -d ${SERVICE}
            docker compose -f docker-compose.dev.yml ps ${SERVICE}
          "