name: deploy-dev-service

# Triggered by repository_dispatch from the polyrepo service workflows
# (prism-materials-service, prism-fixtures-service, prism-models-service,
# prism-agent-service,
# prism-visualiser-service, prism-server-polyrepo).  Pulls and restarts a single named service on
# VM 212 (prism.rebus.industries — prod split stack).
#
# Payload:  {"event_type":"deploy-dev-service","client_payload":{"service":"<name>"}}
# Services: prism-materials | prism-fixtures | prism-models | prism-permissions | prism-agent | prism-visualiser | prism-server
#
# The self-hosted runner reaches the live VM 212 via the `prism-dev` SSH alias.
# (The `prism-prod` alias points at a shadow stack — see .github/workflows/web.yml.)

on:
  repository_dispatch:
    types: [deploy-dev-service]
  workflow_dispatch:
    inputs:
      service:
        description: 'Compose service name (prism-materials | prism-fixtures | prism-models | prism-permissions | prism-agent | prism-visualiser | prism-server)'
        required: true

jobs:
  deploy-dev:
    runs-on: [self-hosted, prism-deploy]
    concurrency:
      group: prism-deploy-vm212
      cancel-in-progress: false
    timeout-minutes: 10
    steps:
      - name: Pull and restart service on VM 212
        run: |
          SERVICE="${{ github.event.client_payload.service || github.event.inputs.service }}"
          if [ -z "$SERVICE" ]; then
            echo "::error::client_payload.service is empty — cannot deploy"
            exit 1
          fi
          echo "Deploying ${SERVICE} to live VM 212 (prism-dev alias)..."
          ssh -o BatchMode=yes -o ConnectTimeout=10 prism-dev "
            set -euo pipefail
            cd /opt/prism
            docker compose pull ${SERVICE}
            docker compose up -d ${SERVICE}
            docker compose ps ${SERVICE}
          "