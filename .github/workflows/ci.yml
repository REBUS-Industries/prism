name: ci
# Lightweight Phase-0 CI: typecheck the server + web, build the agent
# scaffold, validate the JSON-Schema contracts. Heavier build/push/deploy
# workflows arrive in Phase 8.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-typecheck:
    runs-on: ubuntu-latest
    steps:
      # Server typecheck does NOT need the orbit-monorepo submodule.
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package.json
      - name: Install
        working-directory: server
        run: npm install --no-audit --no-fund
      - name: Typecheck
        working-directory: server
        run: npx tsc --noEmit

  web-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package.json
      - name: Install
        working-directory: web
        run: npm install --no-audit --no-fund
      - name: Typecheck
        working-directory: web
        run: npx vue-tsc --noEmit

  agent-build:
    runs-on: windows-latest
    # Agent build needs the orbit-monorepo submodule. Until we wire a deploy
    # key into CI it only runs locally — keep the job here but allow it to
    # be skipped cleanly when the submodule fetch fails. The agent-msi
    # workflow (release builds) does the real signing + publish.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
        continue-on-error: true
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        working-directory: agent
        run: dotnet restore PRISM.Agent.sln
      - name: Build (Debug)
        working-directory: agent
        run: dotnet build PRISM.Agent.sln -c Debug --no-restore

  schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package.json
      - name: Install (server only — owns the validator deps)
        working-directory: server
        run: npm install --no-audit --no-fund
      - name: Validate JSON Schemas + TS<->JSON consistency
        working-directory: server
        run: npm run validate:contracts
