name: server-image

# Builds + pushes the PRISM server container to GHCR.
# Prod deploy (VM 212 split stack) is tag-gated only.
#
# Image:      ghcr.io/rebus-industries/prism-server
# Tags:       latest (on main), <branch>, <short-sha>, <tag-name> (on tag push)
# Caching:    GHA-native layer cache so subsequent pushes are fast
#
# Permissions: requires `packages: write` to push to GHCR; the
# `contents: read` is for checkout.

on:
  push:
    branches: [main]
    # Match every PRISM monorepo `v*` release tag, but exclude the
    # Visualiser tag family (`visualiser-v*`) which has its own
    # workflow.  Without the `!visualiser-*` guard the bare `v*` glob
    # also matches `visualiser-v0.1.0` and friends, causing stray
    # `prism-server:visualiser-v...` images to land on GHCR.  GitHub
    # Actions requires the exclusion to come AFTER the inclusion in
    # the same list.
    tags:
      - 'v*'
      - '!visualiser-*'
    paths:
      - 'server/**'
      - 'web/**'
      - 'shared/**'
      # Agent install scripts + the example config are baked into the
      # server image (served by /api/admin/workstations/downloads/*) so
      # rebuild when they change too.
      - 'agent/install/**'
      - 'agent/src/PRISM.Agent/agent-config.example.json'
      - '.github/workflows/server.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # No submodule fetch: the server image only needs server/ + web/ + shared/.
      # The agent (which needs vendor/orbit-monorepo) is built by agent.yml.
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/rebus-industries/prism-server
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: ${{ github.event_name == 'workflow_dispatch' }}
          cache-from: ${{ github.event_name == 'workflow_dispatch' && '' || 'type=gha' }}
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    # LAN-local self-hosted runner (org Default group). SSH alias `prism-prod`
    # -> rebus@10.0.200.212 (PRISM prod split stack).
    #
    # PROD GATE: only deploy on a version tag push (`v*`) or workflow_dispatch.
    runs-on: [self-hosted, prism-deploy]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Sync split compose + deploy prism-server on VM 212 (prod)
        run: |
          scp -o BatchMode=yes -o ConnectTimeout=10 \
            infra/docker-compose.dev.yml \
            prism-prod:/opt/prism/docker-compose.dev.yml
          scp -o BatchMode=yes -o ConnectTimeout=10 \
            infra/nginx.router.conf \
            prism-prod:/opt/prism/nginx.router.conf
          ssh -o BatchMode=yes -o ConnectTimeout=10 prism-prod <<'REMOTE'
            set -euo pipefail
            cd /opt/prism
            cp docker-compose.dev.yml docker-compose.yml
            docker compose pull prism-server prism-materials prism-visualiser prism-agent
            docker compose up -d prism-server prism-materials prism-visualiser prism-agent prism-web prism-router
            docker compose ps prism-server prism-materials prism-visualiser prism-agent prism-web prism-router
            docker image prune -af --filter "until=24h" 2>/dev/null || true
          REMOTE
